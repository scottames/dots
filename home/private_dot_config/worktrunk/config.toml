# https://worktrunk.dev/config/

# Create sibling worktrees for both normal <repo>/main and legacy <repo>/.bare layouts.
worktree-path = "{{ repo_path }}/../{{ branch | sanitize }}"
skip-shell-integration-prompt = true

[post-start]
copy_ignored = "wt step copy-ignored"
thts = "command -v thts && thts init --no-agents --force"
trunk = """
test -f .trunk/trunk.yaml && trunk check
"""

[projects]
