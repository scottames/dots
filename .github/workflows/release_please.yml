---
on:
  push:
    branches:
      - main
name: release-please
permissions: read-all
jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # yamllint disable-line rule:line-length
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          release-type: go
          package-name: dots
