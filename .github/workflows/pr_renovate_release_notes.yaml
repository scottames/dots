---
name: Renovate Release Notes Comment
on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
permissions: read-all
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  release-notes-comment:
    name: Maintain release notes comment
    if: ${{ github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'app/renovate' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Checkout base repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          package-manager-cache: false
      - name: Update release notes comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MAX_COMMENT_CHARS: 60000
          MAX_COMMENTS: 50
          MAX_RELEASE_LOOKUPS: 80
        run: node .github/scripts/renovate-release-notes-comment.mjs
