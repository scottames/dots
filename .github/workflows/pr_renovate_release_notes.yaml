---
name: Renovate Release Notes Comment
on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
permissions: read-all
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  release-notes-comment:
    name: Maintain release notes comment
    if: ${{ github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'app/renovate' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout base repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-pull-requests: write
      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          package-manager-cache: false
      - name: Update release notes comment
        env:
          # The app token is current-repo scoped; keep external release reads on GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WRITE_TOKEN: ${{ steps.generate-token.outputs.token }}
          COMMENT_AUTHOR: ${{ steps.generate-token.outputs.app-slug }}[bot]
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MAX_COMMENT_CHARS: 60000
          MAX_COMMENTS: 50
          MAX_RELEASE_REQUESTS: 160
        run: node .github/scripts/renovate-release-notes-comment.mjs
